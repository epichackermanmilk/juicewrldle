<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JuiceWRLDLE — Path Builder</title>
<style>
  body{font-family:monospace;background:#06000f;color:#f3e8ff;padding:20px;max-width:700px;margin:0 auto}
  h1{color:#c084fc;margin-bottom:4px}
  .sub{color:#a78bfa;font-size:.85rem;margin-bottom:16px}
  #log{background:rgba(14,4,30,.9);border:1px solid rgba(167,139,250,.25);border-radius:10px;padding:14px;
       font-size:.78rem;height:380px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;margin-top:12px}
  .ok{color:#4ade80}.warn{color:#fde68a}.err{color:#f87171}.info{color:#c084fc}
  #bar-wrap{background:rgba(14,4,30,.9);border:1px solid rgba(167,139,250,.25);border-radius:10px;padding:10px;margin-bottom:12px}
  #bar{height:20px;background:rgba(168,85,247,.15);border-radius:6px;overflow:hidden}
  #fill{height:100%;width:0%;background:linear-gradient(90deg,#7c3aed,#c084fc);border-radius:6px;transition:width .4s}
  #status{font-size:.82rem;color:#a78bfa;margin-top:7px}
  .row{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
  input[type=password]{background:rgba(14,4,30,.9);border:1px solid rgba(167,139,250,.3);
    color:#f3e8ff;padding:7px 10px;border-radius:7px;font-family:monospace;font-size:.85rem;flex:1;min-width:200px}
  label{color:#a78bfa;font-size:.8rem;white-space:nowrap}
  button{background:rgba(168,85,247,.2);border:1px solid rgba(168,85,247,.4);color:#c084fc;padding:8px 16px;
         border-radius:8px;cursor:pointer;font-family:monospace;font-size:.88rem}
  button:hover{background:rgba(168,85,247,.4)}
  button:disabled{opacity:.35;cursor:not-allowed}
</style>
</head>
<body>
<h1>🔧 JuiceWRLDLE Path Builder</h1>
<div class="sub">Scans every song ID, matches via normalized name + titles array. Falls back to /radio/random/.</div>

<div class="row">
  <label>GitHub PAT:</label>
  <input type="password" id="pat" placeholder="ghp_..." />
  <button id="btn" onclick="startBuild()">▶ Start</button>
  <button id="stopBtn" onclick="stopBuild()" disabled>⏹ Stop &amp; Save</button>
</div>

<div id="bar-wrap">
  <div id="bar"><div id="fill"></div></div>
  <div id="status">Enter your GitHub PAT and click Start.</div>
</div>
<div id="log">Waiting...
</div>

<script>
const PROXY      = 'https://juicewrld-proxy.epichackermanmilk.workers.dev';
const REPO       = 'epichackermanmilk/juicewrldle';
const MAX_ID     = 2700;
const CONCUR     = 40;
const SAVE_EVERY = 300;

let running    = false;
let pathMap    = {};   // canonical name -> path
let lookupMap  = {};   // normalized string -> canonical name (built from songs.json name + titles)
let totalSongs = 0;
let songs      = [];
let currentSha = '';

const logEl    = document.getElementById('log');
const fill     = document.getElementById('fill');
const statusEl = document.getElementById('status');
const btn      = document.getElementById('btn');
const stopBtn  = document.getElementById('stopBtn');

function norm(s) {
  return String(s || '')
    .toLowerCase()
    .replace(/[''\u2018\u2019]/g, "'")
    .replace(/[""\u201c\u201d]/g, '"')
    .replace(/\s*\(v\d+[^)]*\)\s*$/i, '')  // strip version suffix e.g. "(v2)"
    .replace(/\s*\[v\d+[^\]]*\]\s*$/i, '')
    .replace(/[^a-z0-9 ']/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function findCanonical(apiName) {
  // Try exact normalized match first
  const n = norm(apiName);
  if (lookupMap[n]) return lookupMap[n];
  // Try stripping trailing parenthetical entirely
  const stripped = n.replace(/\s*\([^)]*\)\s*$/, '').trim();
  if (lookupMap[stripped]) return lookupMap[stripped];
  return null;
}

function appendLog(cls, msg) {
  const s = document.createElement('span');
  s.className = cls;
  s.textContent = (msg !== undefined ? msg : '') + '\n';
  logEl.appendChild(s);
  logEl.scrollTop = logEl.scrollHeight;
}

function coveredCount() {
  return songs.filter(s => pathMap[s.name]).length;
}

function updateBar(covered) {
  const pct = Math.min(100, Math.round((covered / totalSongs) * 100));
  fill.style.width = pct + '%';
  return pct;
}

async function getSha(pat) {
  const r = await fetch('https://api.github.com/repos/' + REPO + '/contents/songs.json', {
    headers: { 'Authorization': 'token ' + pat }
  });
  return (await r.json()).sha;
}

async function commitSongs(pat, label) {
  let merged = 0;
  for (const s of songs) {
    if (pathMap[s.name] && !s.path) { s.path = pathMap[s.name]; merged++; }
  }
  const withPaths = songs.filter(s => s.path).length;
  try {
    currentSha = await getSha(pat);
    const bytes = new TextEncoder().encode(JSON.stringify(songs, null, 2));
    let b64 = '';
    for (let i = 0; i < bytes.length; i += 8192) b64 += String.fromCharCode(...bytes.slice(i, i + 8192));
    b64 = btoa(b64);
    const r = await fetch('https://api.github.com/repos/' + REPO + '/contents/songs.json', {
      method: 'PUT',
      headers: { 'Authorization': 'token ' + pat, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: 'build: ' + label + ' — ' + withPaths + '/' + songs.length + ' paths', content: b64, sha: currentSha })
    });
    const result = await r.json();
    if (r.ok) { appendLog('ok', '[saved] ' + withPaths + '/' + songs.length + ' have paths (' + merged + ' new)'); return withPaths; }
    else appendLog('err', '[save failed] ' + JSON.stringify(result).slice(0, 150));
  } catch(e) { appendLog('err', '[save error] ' + e.message); }
  return songs.filter(s => s.path).length;
}

async function startBuild() {
  const pat = document.getElementById('pat').value.trim();
  if (!pat || !pat.startsWith('ghp_')) { alert('Enter a valid GitHub PAT (starts with ghp_)'); return; }
  btn.disabled = true; stopBtn.disabled = false; running = true; logEl.innerHTML = '';

  appendLog('info', '=== Loading songs.json ===');
  try {
    const r = await fetch('./songs.json');
    songs = await r.json();
    totalSongs = songs.length;

    // Build lookup map: every normalized name/title -> canonical name
    for (const s of songs) {
      lookupMap[norm(s.name)] = s.name;
      if (Array.isArray(s.titles)) {
        for (const t of s.titles) lookupMap[norm(t)] = s.name;
      }
      if (s.path) pathMap[s.name] = s.path;
    }
    const already = coveredCount();
    appendLog('ok', totalSongs + ' songs, ' + Object.keys(lookupMap).length + ' lookup keys. Already have paths: ' + already);
    appendLog('info', 'Sample lookup keys: ' + Object.keys(lookupMap).slice(0,5).join(' | '));
    updateBar(already);
  } catch(e) { appendLog('err', 'songs.json load failed: ' + e.message); btn.disabled=false; return; }

  try { currentSha = await getSha(pat); }
  catch(e) { appendLog('err', 'PAT error: ' + e.message); btn.disabled=false; return; }

  // ── Phase 1: scan /songs/1/ to /songs/MAX_ID/ ──
  appendLog('info', '\n=== Phase 1: Scanning IDs 1–' + MAX_ID + ' (' + CONCUR + ' parallel) ===');
  appendLog('info', 'First response will show what fields /songs/{id}/ actually returns.\n');

  let processed = 0, newPaths = 0, misses = 0, saveCounter = 0;
  let firstLogged = false;
  const unmatchedSample = [];

  for (let i = 1; i <= MAX_ID && running; i += CONCUR) {
    const batch = [];
    for (let id = i; id < i + CONCUR && id <= MAX_ID; id++) {
      batch.push((async (id) => {
        try {
          const r = await fetch(PROXY + '/songs/' + id + '/');
          if (!r.ok) return;
          const d = await r.json();
          const node = (d.song && typeof d.song === 'object') ? d.song : d;
          const apiName = node.name || d.name || null;
          const path = d.path || d.audio_path || d.audio_url || d.file_path ||
                       d.stream_url || d.download_url || d.media_url ||
                       (d.song && (d.song.path || d.song.audio_path || d.song.audio_url)) || null;

          // Log first response in detail
          if (!firstLogged && apiName) {
            firstLogged = true;
            appendLog(path ? 'ok' : 'warn',
              'ID ' + id + ': name="' + apiName + '" path=' + (path || 'NONE') +
              ' | keys: ' + Object.keys(d).join(', '));
          }

          if (!apiName) return;

          if (path) {
            // Has path — find canonical name
            const canonical = findCanonical(apiName) || apiName;
            if (!pathMap[canonical]) { pathMap[canonical] = path; newPaths++; }
          } else {
            // No path — check if name matches songs.json (for diagnostic)
            const canonical = findCanonical(apiName);
            if (!canonical && unmatchedSample.length < 10) unmatchedSample.push(apiName);
            else if (!canonical) misses++;
          }
        } catch(e) {}
        processed++;
        saveCounter++;
      })(id));
    }
    await Promise.all(batch);

    const covered = coveredCount();
    updateBar(covered);
    statusEl.textContent = 'ID scan: ' + processed + '/' + MAX_ID + ' | new paths: ' + newPaths + ' | covered: ' + covered + '/' + totalSongs;
    if (processed % 400 === 0 || processed === MAX_ID) {
      appendLog('ok', '[ID ' + processed + '] new paths: ' + newPaths + ' | covered: ' + covered + '/' + totalSongs);
    }
    if (saveCounter >= SAVE_EVERY && newPaths > 0) {
      saveCounter = 0;
      appendLog('info', '\n[auto-save]');
      await commitSongs(pat, 'ID scan at ' + processed);
    }
    await new Promise(r => setTimeout(r, 10));
  }

  // Show diagnostic for unmatched names
  if (unmatchedSample.length > 0) {
    appendLog('warn', '\nSample API names with no songs.json match (first 10):');
    unmatchedSample.forEach(n => appendLog('warn', '  "' + n + '" → norm: "' + norm(n) + '"'));
  }

  const coveredAfter1 = coveredCount();
  appendLog('info', '\nPhase 1 done. Covered: ' + coveredAfter1 + '/' + totalSongs + ' | paths found in ID scan: ' + newPaths);

  // ── Phase 2: /radio/random/ for remainder ──
  if (coveredAfter1 < totalSongs) {
    appendLog('warn', '\n' + (totalSongs - coveredAfter1) + ' songs still need paths.');
    appendLog('info', '=== Phase 2: /radio/random/ (' + CONCUR + ' parallel) ===\n');
    // Show which songs are still missing
    const missing = songs.filter(s => !pathMap[s.name]).map(s => s.name);
    appendLog('info', 'Missing: ' + missing.slice(0, 8).join(', ') + (missing.length > 8 ? '... (+' + (missing.length - 8) + ' more)' : ''));

    let calls = 0, errs = 0, sc2 = 0, radioNew = 0;
    while (running) {
      const batch = Array.from({ length: CONCUR }, async () => {
        if (!running) return;
        calls++; sc2++;
        try {
          const r = await fetch(PROXY + '/radio/random/');
          if (!r.ok) { errs++; return; }
          const d = await r.json();
          const p = d.path || (d.song && d.song.path) || null;
          const apiName = (d.song && d.song.name) || d.name || null;
          if (!p || !apiName) return;
          const canonical = findCanonical(apiName) || apiName;
          if (!pathMap[canonical]) { pathMap[canonical] = p; radioNew++; }
        } catch(e) { errs++; }
      });
      await Promise.all(batch);

      const covered = coveredCount();
      updateBar(covered);
      statusEl.textContent = covered + '/' + totalSongs + ' covered | ' + calls + ' radio calls | ' + errs + ' errors';
      if (calls % 500 === 0) appendLog('ok', '[' + calls + ' calls] ' + covered + '/' + totalSongs + ' | new this phase: ' + radioNew);
      if (sc2 >= SAVE_EVERY) {
        sc2 = 0;
        appendLog('info', '\n[auto-save at ' + calls + ' calls]');
        await commitSongs(pat, 'radio at ' + calls + ' calls');
        appendLog('', '');
      }
      if (covered >= totalSongs) { running = false; appendLog('info', '\n🎉 100% after ' + calls + ' radio calls!'); break; }
      await new Promise(r => setTimeout(r, 15));
    }
  }

  stopBtn.disabled = true;
  appendLog('info', '\n=== Final save ===');
  const final = await commitSongs(pat, 'final');
  updateBar(final);
  statusEl.textContent = final >= totalSongs ? '✓ 100% complete!' : final + '/' + totalSongs + ' saved.';
  btn.textContent = '▶ Run Again'; btn.disabled = false;
}

function stopBuild() {
  running = false; stopBtn.disabled = true;
  appendLog('warn', 'Stopping...');
}
</script>
</body>
</html>
