<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JuiceWRLDLE — Path Builder</title>
<style>
  body{font-family:monospace;background:#06000f;color:#f3e8ff;padding:20px;max-width:700px;margin:0 auto}
  h1{color:#c084fc;margin-bottom:4px}
  .sub{color:#a78bfa;font-size:.85rem;margin-bottom:16px}
  #log{background:rgba(14,4,30,.9);border:1px solid rgba(167,139,250,.25);border-radius:10px;padding:14px;
       font-size:.78rem;height:380px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;margin-top:12px}
  .ok{color:#4ade80}.warn{color:#fde68a}.err{color:#f87171}.info{color:#c084fc}
  #bar-wrap{background:rgba(14,4,30,.9);border:1px solid rgba(167,139,250,.25);border-radius:10px;padding:10px;margin-bottom:12px}
  #bar{height:20px;background:rgba(168,85,247,.15);border-radius:6px;overflow:hidden}
  #fill{height:100%;width:0%;background:linear-gradient(90deg,#7c3aed,#c084fc);border-radius:6px;transition:width .4s}
  #status{font-size:.82rem;color:#a78bfa;margin-top:7px}
  .row{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
  input[type=password]{background:rgba(14,4,30,.9);border:1px solid rgba(167,139,250,.3);
    color:#f3e8ff;padding:7px 10px;border-radius:7px;font-family:monospace;font-size:.85rem;flex:1;min-width:200px}
  label{color:#a78bfa;font-size:.8rem;white-space:nowrap}
  button{background:rgba(168,85,247,.2);border:1px solid rgba(168,85,247,.4);color:#c084fc;padding:8px 16px;
         border-radius:8px;cursor:pointer;font-family:monospace;font-size:.88rem}
  button:hover{background:rgba(168,85,247,.4)}
  button:disabled{opacity:.35;cursor:not-allowed}
</style>
</head>
<body>
<h1>🔧 JuiceWRLDLE Path Builder</h1>
<div class="sub">Probes for fast bulk endpoints first, then falls back to parallel /radio/random/.</div>

<div class="row">
  <label>GitHub PAT:</label>
  <input type="password" id="pat" placeholder="ghp_..." />
  <button id="btn" onclick="startBuild()">▶ Start</button>
  <button id="stopBtn" onclick="stopBuild()" disabled>⏹ Stop &amp; Save</button>
</div>

<div id="bar-wrap">
  <div id="bar"><div id="fill"></div></div>
  <div id="status">Enter your GitHub PAT and click Start.</div>
</div>
<div id="log">Waiting...
</div>

<script>
const PROXY      = 'https://juicewrld-proxy.epichackermanmilk.workers.dev';
const REPO       = 'epichackermanmilk/juicewrldle';
const CONCUR     = 40;       // parallel /radio/random/ calls
const SAVE_EVERY = 300;

let running    = false;
let pathMap    = {};
let songSet    = null;
let totalSongs = 0;
let songs      = [];
let currentSha = '';

const logEl    = document.getElementById('log');
const fill     = document.getElementById('fill');
const statusEl = document.getElementById('status');
const btn      = document.getElementById('btn');
const stopBtn  = document.getElementById('stopBtn');

function appendLog(cls, msg) {
  const s = document.createElement('span');
  s.className = cls;
  s.textContent = (msg !== undefined ? msg : '') + '\n';
  logEl.appendChild(s);
  logEl.scrollTop = logEl.scrollHeight;
}

function coveredCount() {
  let n = 0;
  for (const name of songSet) { if (pathMap[name]) n++; }
  return n;
}

function updateBar(covered) {
  const pct = Math.min(100, Math.round((covered / totalSongs) * 100));
  fill.style.width = pct + '%';
  return pct;
}

async function getSha(pat) {
  const r = await fetch('https://api.github.com/repos/' + REPO + '/contents/songs.json', {
    headers: { 'Authorization': 'token ' + pat }
  });
  return (await r.json()).sha;
}

async function commitSongs(pat, label) {
  let merged = 0;
  for (const s of songs) {
    if (pathMap[s.name] && !s.path) { s.path = pathMap[s.name]; merged++; }
  }
  const withPaths = songs.filter(s => s.path).length;
  try {
    currentSha = await getSha(pat);
    const jsonStr = JSON.stringify(songs, null, 2);
    const bytes = new TextEncoder().encode(jsonStr);
    let b64 = '';
    for (let i = 0; i < bytes.length; i += 8192) b64 += String.fromCharCode(...bytes.slice(i, i + 8192));
    b64 = btoa(b64);
    const r = await fetch('https://api.github.com/repos/' + REPO + '/contents/songs.json', {
      method: 'PUT',
      headers: { 'Authorization': 'token ' + pat, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: 'build: ' + label + ' — ' + withPaths + '/' + songs.length + ' paths', content: b64, sha: currentSha })
    });
    const result = await r.json();
    if (r.ok) {
      appendLog('ok', '[saved] ' + withPaths + '/' + songs.length + ' have paths (' + merged + ' new)');
      return withPaths;
    } else {
      appendLog('err', '[save failed] ' + JSON.stringify(result).slice(0, 150));
    }
  } catch(e) { appendLog('err', '[save error] ' + e.message); }
  return songs.filter(s => s.path).length;
}

// ── PHASE 0: probe for bulk endpoints ────────────────────────────────────────
async function probeBulkEndpoints() {
  appendLog('info', '=== Probing for bulk endpoints ===');

  // Try /songs/ with page_size and various field params that might expose path
  const probes = [
    '/songs/?page_size=10',
    '/songs/?page_size=10&include_path=true',
    '/songs/?page_size=10&fields=name,path',
    '/songs/?page_size=10&format=json',
    '/radio/?page_size=10',
    '/radio/?count=10',
    '/radio/list/?page_size=10',
  ];

  for (const endpoint of probes) {
    try {
      const r = await fetch(PROXY + endpoint);
      if (!r.ok) { appendLog('warn', endpoint + ' → HTTP ' + r.status); continue; }
      const d = await r.json();
      // Check if results array items have a path field
      const results = d.results || d.songs || d.data || (Array.isArray(d) ? d : null);
      if (results && results.length > 0) {
        const first = results[0];
        const hasPath = !!(first.path || first.audio_path || first.audio_url || first.file_path);
        const keys = Object.keys(first).join(', ');
        appendLog(hasPath ? 'ok' : 'warn',
          endpoint + ' → ' + results.length + ' results | path: ' + (hasPath ? 'YES ✓' : 'no') + ' | keys: ' + keys);
        if (hasPath) return { endpoint, pathField: first.path ? 'path' : first.audio_path ? 'audio_path' : 'audio_url', total: d.count || d.total || null };
      } else {
        appendLog('warn', endpoint + ' → no results array | keys: ' + Object.keys(d).join(', '));
      }
    } catch(e) {
      appendLog('err', endpoint + ' → ' + e.message);
    }
  }
  return null;
}

// ── PHASE 1: paginate bulk endpoint ──────────────────────────────────────────
async function collectViaPagination(endpoint, pathField) {
  appendLog('info', '\n=== Fast path: paginating ' + endpoint + ' ===');
  let page = 1, collected = 0;
  const pageSize = 100;
  const base = endpoint.split('?')[0];

  while (running) {
    try {
      const r = await fetch(PROXY + base + '?page_size=' + pageSize + '&page=' + page);
      if (!r.ok) { appendLog('err', 'Page ' + page + ' HTTP ' + r.status); break; }
      const d = await r.json();
      const results = d.results || d.songs || d.data || (Array.isArray(d) ? d : []);
      if (!results.length) break;

      for (const item of results) {
        const p = item[pathField] || item.path || item.audio_path || item.audio_url || null;
        const n = item.name || (item.song && item.song.name) || null;
        if (p && n && !pathMap[n]) { pathMap[n] = p; collected++; }
      }

      const covered = coveredCount();
      updateBar(covered);
      appendLog('ok', 'Page ' + page + ': ' + results.length + ' items | songs.json covered: ' + covered + '/' + totalSongs);

      if (!d.next && results.length < pageSize) break;
      page++;
      await new Promise(r => setTimeout(r, 100));
    } catch(e) { appendLog('err', 'Pagination error: ' + e.message); break; }
  }
  return coveredCount();
}

// ── PHASE 2: /radio/random/ fallback ─────────────────────────────────────────
async function collectViaRandom(pat) {
  appendLog('info', '\n=== Fallback: parallel /radio/random/ (concurrency=' + CONCUR + ') ===\n');
  let callsMade = 0, errors = 0, saveCounter = 0;

  async function oneCall() {
    if (!running) return;
    callsMade++; saveCounter++;
    try {
      const r = await fetch(PROXY + '/radio/random/');
      if (!r.ok) { errors++; return; }
      const d = await r.json();
      const p = d.path || (d.song && d.song.path) || null;
      const n = (d.song && d.song.name) || d.name || null;
      if (p && n && !pathMap[n]) pathMap[n] = p;
    } catch(e) { errors++; }
  }

  while (running) {
    const batch = [];
    for (let i = 0; i < CONCUR; i++) batch.push(oneCall());
    await Promise.all(batch);

    const covered = coveredCount();
    updateBar(covered);
    statusEl.textContent = covered + '/' + totalSongs + ' covered (' + Math.round(covered/totalSongs*100) + '%) | ' + callsMade + ' calls | ' + errors + ' errors';

    if (callsMade % 200 === 0) appendLog('ok', '[' + callsMade + ' calls] ' + covered + '/' + totalSongs + ' covered');

    if (saveCounter >= SAVE_EVERY) {
      saveCounter = 0;
      appendLog('info', '\n[auto-save at ' + callsMade + ' calls]');
      await commitSongs(pat, 'auto-save at ' + callsMade + ' calls');
      appendLog('', '');
    }

    if (covered >= totalSongs) {
      appendLog('info', '\n🎉 100% after ' + callsMade + ' /radio/random/ calls!');
      running = false;
      break;
    }

    await new Promise(r => setTimeout(r, 15));
  }
}

async function startBuild() {
  const pat = document.getElementById('pat').value.trim();
  if (!pat || !pat.startsWith('ghp_')) { alert('Enter a valid GitHub PAT (starts with ghp_)'); return; }

  btn.disabled = true;
  stopBtn.disabled = false;
  running = true;
  logEl.innerHTML = '';

  // Load songs.json
  appendLog('info', '=== Loading songs.json ===');
  try {
    const r = await fetch('./songs.json');
    songs = await r.json();
    totalSongs = songs.length;
    songSet = new Set(songs.map(s => s.name));
    let already = 0;
    for (const s of songs) { if (s.path) { pathMap[s.name] = s.path; already++; } }
    appendLog('ok', totalSongs + ' songs. Already have paths: ' + already);
    updateBar(already);
  } catch(e) { appendLog('err', 'Could not load songs.json: ' + e.message); btn.disabled=false; return; }

  try { currentSha = await getSha(pat); }
  catch(e) { appendLog('err', 'PAT error: ' + e.message); btn.disabled=false; return; }

  // Try bulk endpoints first
  const bulk = await probeBulkEndpoints();

  if (bulk) {
    appendLog('ok', '\n✓ Bulk endpoint found: ' + bulk.endpoint);
    await collectViaPagination(bulk.endpoint, bulk.pathField);
    const covered = coveredCount();
    appendLog('ok', 'Pagination done. Covered: ' + covered + '/' + totalSongs);
    if (covered < totalSongs) {
      appendLog('warn', (totalSongs - covered) + ' songs still missing — switching to /radio/random/ for remainder.');
      await collectViaRandom(pat);
    }
  } else {
    appendLog('warn', '\nNo bulk endpoint with paths found — using /radio/random/ only.');
    await collectViaRandom(pat);
  }

  stopBtn.disabled = true;
  appendLog('info', '\n=== Final save ===');
  const final = await commitSongs(pat, 'final');
  updateBar(final);
  statusEl.textContent = final >= totalSongs ? '✓ 100% complete!' : final + '/' + totalSongs + ' saved.';
  btn.textContent = '▶ Run Again';
  btn.disabled = false;
}

function stopBuild() {
  running = false;
  stopBtn.disabled = true;
  appendLog('warn', 'Stopping after current batch...');
}
</script>
</body>
</html>
