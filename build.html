<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JuiceWRLDLE — Path Builder</title>
<style>
  body{font-family:monospace;background:#06000f;color:#f3e8ff;padding:20px;max-width:700px;margin:0 auto}
  h1{color:#c084fc;margin-bottom:4px}
  .sub{color:#a78bfa;font-size:.85rem;margin-bottom:16px}
  #log{background:rgba(14,4,30,.9);border:1px solid rgba(167,139,250,.25);border-radius:10px;padding:14px;
       font-size:.78rem;height:380px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;margin-top:12px}
  .ok{color:#4ade80}.warn{color:#fde68a}.err{color:#f87171}.info{color:#c084fc}
  #bar-wrap{background:rgba(14,4,30,.9);border:1px solid rgba(167,139,250,.25);border-radius:10px;padding:10px;margin-bottom:12px}
  #bar{height:20px;background:rgba(168,85,247,.15);border-radius:6px;overflow:hidden}
  #fill{height:100%;width:0%;background:linear-gradient(90deg,#7c3aed,#c084fc);border-radius:6px;transition:width .4s}
  #status{font-size:.82rem;color:#a78bfa;margin-top:7px}
  .row{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
  input[type=password]{background:rgba(14,4,30,.9);border:1px solid rgba(167,139,250,.3);
    color:#f3e8ff;padding:7px 10px;border-radius:7px;font-family:monospace;font-size:.85rem;flex:1;min-width:200px}
  label{color:#a78bfa;font-size:.8rem;white-space:nowrap}
  button{background:rgba(168,85,247,.2);border:1px solid rgba(168,85,247,.4);color:#c084fc;padding:8px 16px;
         border-radius:8px;cursor:pointer;font-family:monospace;font-size:.88rem}
  button:hover{background:rgba(168,85,247,.4)}
  button:disabled{opacity:.35;cursor:not-allowed}
</style>
</head>
<body>
<h1>🔧 JuiceWRLDLE Path Builder</h1>
<div class="sub">Fetches every /songs/{id}/ endpoint and matches paths to songs.json by name.</div>

<div class="row">
  <label>GitHub PAT:</label>
  <input type="password" id="pat" placeholder="ghp_..." />
  <button id="btn" onclick="startBuild()">▶ Start</button>
  <button id="stopBtn" onclick="stopBuild()" disabled>⏹ Stop &amp; Save</button>
</div>

<div id="bar-wrap">
  <div id="bar"><div id="fill"></div></div>
  <div id="status">Enter your GitHub PAT and click Start.</div>
</div>
<div id="log">Waiting...
</div>

<script>
const PROXY      = 'https://juicewrld-proxy.epichackermanmilk.workers.dev';
const REPO       = 'epichackermanmilk/juicewrldle';
const MAX_ID     = 2700;   // scan IDs 1–2700 to cover all songs + buffer
const CONCUR     = 40;     // parallel requests
const SAVE_EVERY = 300;    // auto-save every N IDs processed

let running    = false;
let pathMap    = {};
let songSet    = null;
let totalSongs = 0;
let songs      = [];
let currentSha = '';
let hasPathsInApi = null;  // discovered on first response

const logEl    = document.getElementById('log');
const fill     = document.getElementById('fill');
const statusEl = document.getElementById('status');
const btn      = document.getElementById('btn');
const stopBtn  = document.getElementById('stopBtn');

function appendLog(cls, msg) {
  const s = document.createElement('span');
  s.className = cls;
  s.textContent = (msg !== undefined ? msg : '') + '\n';
  logEl.appendChild(s);
  logEl.scrollTop = logEl.scrollHeight;
}

function coveredCount() {
  let n = 0;
  for (const name of songSet) { if (pathMap[name]) n++; }
  return n;
}

function updateBar(covered) {
  const pct = Math.min(100, Math.round((covered / totalSongs) * 100));
  fill.style.width = pct + '%';
  return pct;
}

async function getSha(pat) {
  const r = await fetch('https://api.github.com/repos/' + REPO + '/contents/songs.json', {
    headers: { 'Authorization': 'token ' + pat }
  });
  return (await r.json()).sha;
}

async function commitSongs(pat, label) {
  let merged = 0;
  for (const s of songs) {
    if (pathMap[s.name] && !s.path) { s.path = pathMap[s.name]; merged++; }
  }
  const withPaths = songs.filter(s => s.path).length;
  try {
    currentSha = await getSha(pat);
    const jsonStr = JSON.stringify(songs, null, 2);
    const bytes = new TextEncoder().encode(jsonStr);
    let b64 = '';
    for (let i = 0; i < bytes.length; i += 8192) b64 += String.fromCharCode(...bytes.slice(i, i + 8192));
    b64 = btoa(b64);
    const r = await fetch('https://api.github.com/repos/' + REPO + '/contents/songs.json', {
      method: 'PUT',
      headers: { 'Authorization': 'token ' + pat, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: 'build: ' + label + ' — ' + withPaths + '/' + songs.length + ' paths', content: b64, sha: currentSha })
    });
    const result = await r.json();
    if (r.ok) {
      appendLog('ok', '[saved] ' + withPaths + '/' + songs.length + ' songs have paths (' + merged + ' new)');
      return withPaths;
    } else {
      appendLog('err', '[save failed] ' + JSON.stringify(result).slice(0, 150));
    }
  } catch(e) { appendLog('err', '[save error] ' + e.message); }
  return songs.filter(s => s.path).length;
}

async function fetchSongId(id) {
  try {
    const r = await fetch(PROXY + '/songs/' + id + '/');
    if (!r.ok) return null;
    const d = await r.json();
    const node = (d.song && typeof d.song === 'object') ? d.song : d;
    const name = node.name || d.name || null;
    const path = d.path || d.audio_path || d.audio_url || d.file_path || d.stream_url ||
                 d.download_url || d.media_url ||
                 (d.song && (d.song.path || d.song.audio_path || d.song.audio_url)) || null;

    // Log what the API actually returns on first call
    if (hasPathsInApi === null) {
      hasPathsInApi = !!path;
      appendLog(path ? 'ok' : 'warn',
        'ID 1 sample — name: "' + name + '" | path field: ' + (path || 'NOT PRESENT') +
        ' | all keys: ' + Object.keys(d).join(', '));
      if (!path) {
        appendLog('warn', 'No path in /songs/{id}/ — will match names to songs.json only.');
        appendLog('warn', 'You will still need /radio/random/ for paths. Starting that after ID scan...\n');
      } else {
        appendLog('ok', 'Path field exists! Collecting all paths via ID scan.\n');
      }
    }

    return { name, path };
  } catch(e) { return null; }
}

async function startBuild() {
  const pat = document.getElementById('pat').value.trim();
  if (!pat || !pat.startsWith('ghp_')) { alert('Enter a valid GitHub PAT (starts with ghp_)'); return; }

  btn.disabled = true;
  stopBtn.disabled = false;
  running = true;
  logEl.innerHTML = '';

  appendLog('info', '=== Loading songs.json ===');
  try {
    const r = await fetch('./songs.json');
    songs = await r.json();
    totalSongs = songs.length;
    songSet = new Set(songs.map(s => s.name));
    let already = 0;
    for (const s of songs) { if (s.path) { pathMap[s.name] = s.path; already++; } }
    appendLog('ok', totalSongs + ' songs. Already have paths: ' + already);
    updateBar(already);
  } catch(e) { appendLog('err', 'Could not load songs.json: ' + e.message); btn.disabled=false; return; }

  try { currentSha = await getSha(pat); }
  catch(e) { appendLog('err', 'PAT error: ' + e.message); btn.disabled=false; return; }

  appendLog('info', '\n=== Scanning /songs/1/ through /songs/' + MAX_ID + '/ (' + CONCUR + ' parallel) ===\n');

  let processed = 0, matched = 0, saveCounter = 0, errors = 0;
  const ids = Array.from({ length: MAX_ID }, (_, i) => i + 1);

  // Process IDs in parallel batches
  for (let i = 0; i < ids.length && running; i += CONCUR) {
    const batch = ids.slice(i, i + CONCUR).map(async (id) => {
      const result = await fetchSongId(id);
      processed++;
      saveCounter++;
      if (!result) { errors++; return; }
      const { name, path } = result;
      if (name && path && !pathMap[name]) { pathMap[name] = path; matched++; }
      else if (name && !path && songSet.has(name) && !pathMap[name]) {
        // No path from ID endpoint, but we confirmed the name exists — log it
      }
    });

    await Promise.all(batch);

    const covered = coveredCount();
    updateBar(covered);
    statusEl.textContent = 'ID scan: ' + processed + '/' + MAX_ID + ' | matched: ' + matched + ' | songs.json covered: ' + covered + '/' + totalSongs;

    if (Math.floor(processed / 200) > Math.floor((processed - CONCUR) / 200)) {
      appendLog('ok', '[ID ' + processed + '] matched: ' + matched + ' | songs.json covered: ' + covered + '/' + totalSongs);
    }

    if (saveCounter >= SAVE_EVERY) {
      saveCounter = 0;
      appendLog('info', '\n[auto-save at ID ' + processed + ']');
      await commitSongs(pat, 'ID scan at ' + processed);
      appendLog('', '');
    }

    await new Promise(r => setTimeout(r, 10));
  }

  const coveredAfterScan = coveredCount();
  appendLog('info', '\nID scan complete. Covered: ' + coveredAfterScan + '/' + totalSongs);

  // If IDs had no paths OR didn't cover everything, fall back to /radio/random/
  if (coveredAfterScan < totalSongs) {
    const remaining = totalSongs - coveredAfterScan;
    appendLog('warn', remaining + ' songs still missing paths — switching to /radio/random/ for remainder.');
    appendLog('info', '=== /radio/random/ fallback (concurrency=' + CONCUR + ') ===\n');

    let callsMade = 0, errors2 = 0, saveCounter2 = 0;

    while (running) {
      const batch = Array.from({ length: CONCUR }, async () => {
        if (!running) return;
        callsMade++; saveCounter2++;
        try {
          const r = await fetch(PROXY + '/radio/random/');
          if (!r.ok) { errors2++; return; }
          const d = await r.json();
          const p = d.path || (d.song && d.song.path) || null;
          const n = (d.song && d.song.name) || d.name || null;
          if (p && n && !pathMap[n]) pathMap[n] = p;
        } catch(e) { errors2++; }
      });

      await Promise.all(batch);

      const covered = coveredCount();
      updateBar(covered);
      statusEl.textContent = covered + '/' + totalSongs + ' covered | ' + callsMade + ' calls | ' + errors2 + ' errors';

      if (callsMade % 200 === 0) appendLog('ok', '[' + callsMade + ' calls] ' + covered + '/' + totalSongs + ' covered');

      if (saveCounter2 >= SAVE_EVERY) {
        saveCounter2 = 0;
        appendLog('info', '\n[auto-save at ' + callsMade + ' calls]');
        await commitSongs(pat, 'radio fallback at ' + callsMade + ' calls');
        appendLog('', '');
      }

      if (covered >= totalSongs) {
        appendLog('info', '\n🎉 100% coverage after ' + callsMade + ' /radio/random/ calls!');
        running = false;
        break;
      }

      await new Promise(r => setTimeout(r, 15));
    }
  }

  stopBtn.disabled = true;
  appendLog('info', '\n=== Final save ===');
  const final = await commitSongs(pat, 'final');
  updateBar(final);
  statusEl.textContent = final >= totalSongs ? '✓ 100% complete!' : final + '/' + totalSongs + ' saved.';
  btn.textContent = '▶ Run Again';
  btn.disabled = false;
}

function stopBuild() {
  running = false;
  stopBtn.disabled = true;
  appendLog('warn', 'Stopping after current batch...');
}
</script>
</body>
</html>
