<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JuiceWRLDLE API Diagnostics</title>
<style>
  body{font-family:monospace;background:#06000f;color:#f3e8ff;padding:20px;max-width:800px;margin:0 auto}
  h1{color:#c084fc;margin-bottom:4px}
  .sub{color:#a78bfa;font-size:.85rem;margin-bottom:20px}
  .card{background:rgba(14,4,30,.9);border:1px solid rgba(167,139,250,.25);border-radius:10px;padding:14px;margin-bottom:12px}
  .label{color:#e879f9;font-size:.75rem;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
  .ok{color:#4ade80}.fail{color:#f87171}.warn{color:#fde68a}
  pre{font-size:.75rem;white-space:pre-wrap;word-break:break-all;margin-top:6px;max-height:200px;overflow-y:auto;color:#c4b5fd}
  audio{display:block;width:100%;margin-top:8px}
  button{background:rgba(168,85,247,.2);border:1px solid rgba(168,85,247,.4);color:#c084fc;padding:6px 14px;border-radius:6px;cursor:pointer;font-family:monospace;margin-top:8px}
  button:hover{background:rgba(168,85,247,.4)}
  hr{border:none;border-top:1px solid rgba(167,139,250,.15);margin:16px 0}
</style>
</head>
<body>
<h1>🔬 JuiceWRLDLE API Diagnostics</h1>
<div class="sub">Testing all endpoints for Song ID 1 (Lucid Dreams). Results appear below as they load.</div>
<div id="out"></div>

<script>
const PROXY = 'https://juicewrld-proxy.epichackermanmilk.workers.dev';
const out = document.getElementById('out');

function section(title) {
  const d = document.createElement('div');
  d.className = 'card';
  d.innerHTML = '<div class="label">' + title + '</div><div class="body">⏳ running...</div>';
  out.appendChild(d);
  return d.querySelector('.body');
}

function log(el, html) { el.innerHTML = html; }

async function run() {

  // ── 1. /songs/1/ raw response ──
  const s1 = section('1. GET /songs/1/ (song detail endpoint)');
  try {
    const r = await fetch(PROXY + '/songs/1/', { headers: { Accept: 'application/json' } });
    const text = await r.text();
    let parsed;
    try { parsed = JSON.parse(text); } catch(e) { parsed = null; }
    const keys = parsed ? Object.keys(parsed) : [];
    const path = parsed ? (parsed.path || parsed.audio_path || parsed.audio_url || parsed.file_path || parsed.stream_url || parsed.download_url || null) : null;
    log(s1,
      '<span class="' + (r.ok ? 'ok' : 'fail') + '">HTTP ' + r.status + '</span> | keys: ' + keys.join(', ') +
      '<br>path field: <span class="' + (path ? 'ok' : 'fail') + '">' + (path || 'NOT FOUND') + '</span>' +
      '<pre>' + (text.slice(0,500)) + '</pre>'
    );
  } catch(e) { log(s1, '<span class="fail">ERROR: ' + e.message + '</span>'); }

  // ── 2. /radio/random/ raw response ──
  const s2 = section('2. GET /radio/random/ (raw fields)');
  let radioPath = null, radioSongId = null, radioSongName = null;
  try {
    const r = await fetch(PROXY + '/radio/random/', { headers: { Accept: 'application/json' } });
    const data = await r.json();
    radioPath = data.path || (data.song && data.song.path) || null;
    radioSongId = (data.song && data.song.id) || data.id || null;
    radioSongName = (data.song && data.song.name) || data.name || null;
    const allKeys = Object.keys(data);
    const songKeys = data.song ? Object.keys(data.song) : [];
    log(s2,
      '<span class="ok">HTTP ' + r.status + '</span> | top keys: ' + allKeys.join(', ') +
      '<br>song keys: ' + songKeys.join(', ') +
      '<br>path: <span class="' + (radioPath ? 'ok' : 'fail') + '">' + (radioPath || 'NOT FOUND') + '</span>' +
      '<br>song.id: <b>' + radioSongId + '</b> | song.name: <b>' + radioSongName + '</b>' +
      '<pre>' + JSON.stringify(data, null, 2).slice(0,600) + '</pre>'
    );
  } catch(e) { log(s2, '<span class="fail">ERROR: ' + e.message + '</span>'); }

  // ── 3. Try to fetch /radio/1/ or /radio/song/1/ ──
  const s3 = section('3. Trying radio endpoints for specific song ID');
  const radioVariants = ['/radio/1/', '/radio/song/1/', '/songs/1/radio/', '/songs/1/stream/'];
  let variant3html = '';
  for (const v of radioVariants) {
    try {
      const r = await fetch(PROXY + v, { headers: { Accept: 'application/json' } });
      const text = await r.text().catch(() => '');
      variant3html += '<span class="' + (r.ok ? 'ok' : 'warn') + '">HTTP ' + r.status + '</span> ' + v + '<br>';
      if (r.ok) variant3html += '<pre>' + text.slice(0,200) + '</pre>';
    } catch(e) { variant3html += '<span class="fail">FAIL</span> ' + v + ': ' + e.message + '<br>'; }
  }
  log(s3, variant3html);

  // ── 4. Audio URL attempts ──
  const s4 = section('4. Audio playback tests');
  if (!radioPath) {
    log(s4, '<span class="warn">Skipping — no path from /radio/random/</span>');
  } else {
    const cleanPath = (() => {
      let p = String(radioPath);
      if (p.startsWith('http')) {
        try {
          const u = new URL(p);
          if (u.pathname.includes('download') && u.searchParams.get('path')) return u.searchParams.get('path');
          return u.pathname.replace(/^\//, '');
        } catch(e) {}
      }
      return p.replace(/^\//, '');
    })();

    const urls = {
      'Proxy /files/download/': PROXY + '/files/download/?path=' + encodeURIComponent(cleanPath),
      'Direct juicewrldapi.com': 'https://juicewrldapi.com/files/download/?path=' + encodeURIComponent(cleanPath),
      'Raw path as-is': radioPath,
    };

    let audioHtml = '<b>Clean path extracted:</b> <code>' + cleanPath + '</code><br><br>';
    for (const [label, url] of Object.entries(urls)) {
      audioHtml += '<b>' + label + ':</b><br><code style="font-size:.7rem">' + url.slice(0,80) + '...</code>';
      audioHtml += '<audio controls src="' + url + '" style="height:32px;margin:4px 0 10px"></audio>';
    }
    log(s4, audioHtml);
  }

  // ── 5. Check if songs.json song[0] has path ──
  const s5 = section('5. songs.json first entry');
  try {
    const r = await fetch('./songs.json');
    const data = await r.json();
    const first = data[0] || {};
    log(s5, 'Total songs: ' + data.length + ' | First song: <b>' + first.name + '</b> | has path: <span class="' + (first.path ? 'ok' : 'fail') + '">' + (first.path || 'no') + '</span>' +
      '<pre>' + JSON.stringify(first, null, 2) + '</pre>');
  } catch(e) { log(s5, '<span class="fail">ERROR: ' + e.message + '</span>'); }

}

run();
</script>
</body>
</html>
